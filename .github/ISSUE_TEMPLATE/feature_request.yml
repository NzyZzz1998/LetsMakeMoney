name: 功能建议
description: 说明问题和使用场景，不直接假定实现方案
title: "[Idea] "
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes: {label: 要解决的问题, description: 谁在什么场景遇到了什么问题？}
    validations: {required: true}
  - type: textarea
    id: value
    attributes: {label: 预期价值与成功标准}
    validations: {required: true}
  - type: textarea
    id: alternatives
    attributes: {label: 已有替代方案与取舍}
  - type: textarea
    id: evidence
    attributes: {label: 截图或其他证据, description: 请先脱敏。}
