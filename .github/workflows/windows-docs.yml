name: Windows docs and compliance
on:
  pull_request:
  push:
    branches: [main]
permissions:
  contents: read
jobs:
  docs:
    name: Windows docs and compliance
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Documentation and compliance suite
        shell: pwsh
        run: ./scripts/run_ci_verification.ps1 -Suite docs
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        if: always()
        with:
          name: docs-verification-summary
          path: .tmp_ci/verification-summary.json
