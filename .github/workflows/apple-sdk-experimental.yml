name: Apple SDK experimental gate

on:
  workflow_dispatch:
  push:
    branches:
      - ios-main
    paths:
      - 'apple/**'
      - 'shared/salary-schema/**'
      - 'scripts/apple/**'
      - '.github/workflows/apple-sdk-experimental.yml'

permissions:
  contents: read

jobs:
  apple-sdk-experimental:
    name: Experimental Apple SDK compile
    runs-on: macos-15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Record Apple toolchain
        run: |
          xcodebuild -version
          swift --version
          xcrun simctl list devices available
      - name: Test SalaryCore on macOS
        run: swift test --package-path apple/Packages/SalaryCore
      - name: Run source contracts
        run: python3 -m unittest discover -s scripts/apple/tests -p 'test_*.py'
      - name: Export the Playgrounds application
        shell: pwsh
        run: ./scripts/apple/export_playgrounds_m3.ps1 -OutputRoot build/apple-sdk-ci -PackageName LetsMakeMoneyAppleSDK -BundleIdentifier com.nzyzzz.letsmakemoney.applesdk -ExcludePreviews
      - name: List generated Apple schemes
        working-directory: build/apple-sdk-ci/LetsMakeMoneyAppleSDK.swiftpm
        run: xcodebuild -list | tee ../xcodebuild-list.log
      - name: Compile against the iOS Simulator SDK
        working-directory: build/apple-sdk-ci/LetsMakeMoneyAppleSDK.swiftpm
        run: |
          set -o pipefail
          xcodebuild \
            -scheme LetsMakeMoneyAppleSDK \
            -destination 'generic/platform=iOS Simulator' \
            -derivedDataPath ../DerivedData \
            CODE_SIGNING_ALLOWED=NO \
            build | tee ../xcodebuild.log
      - name: List G3 platform probe schemes
        working-directory: apple/Packages/ApplePlatformGate
        run: xcodebuild -list | tee ../../../build/apple-sdk-ci/g3-schemes.log
      - name: Compile G3 App probe against the iOS Simulator SDK
        working-directory: apple/Packages/ApplePlatformGate
        run: |
          set -o pipefail
          xcodebuild \
            -scheme G3AppProbe \
            -destination 'generic/platform=iOS Simulator' \
            -derivedDataPath ../../../build/apple-sdk-ci/G3AppDerivedData \
            CODE_SIGNING_ALLOWED=NO \
            build | tee ../../../build/apple-sdk-ci/g3-app.log
      - name: Compile G3 Widget and Activity probe against the iOS Simulator SDK
        working-directory: apple/Packages/ApplePlatformGate
        run: |
          set -o pipefail
          xcodebuild \
            -scheme G3WidgetActivityProbe \
            -destination 'generic/platform=iOS Simulator' \
            -derivedDataPath ../../../build/apple-sdk-ci/G3WidgetDerivedData \
            CODE_SIGNING_ALLOWED=NO \
            build | tee ../../../build/apple-sdk-ci/g3-widget-activity.log
      - name: Compile G3 Watch probe against the watchOS Simulator SDK
        working-directory: apple/Packages/ApplePlatformGate
        run: |
          set -o pipefail
          xcodebuild \
            -scheme G3WatchProbe \
            -destination 'generic/platform=watchOS Simulator' \
            -derivedDataPath ../../../build/apple-sdk-ci/G3WatchDerivedData \
            CODE_SIGNING_ALLOWED=NO \
            build | tee ../../../build/apple-sdk-ci/g3-watch.log
      - name: Bootstrap pinned XcodeGen
        run: ./scripts/apple/bootstrap_xcodegen.sh "$RUNNER_TEMP/lmm-xcodegen"
      - name: Generate the formal Apple project
        run: xcodegen generate --spec apple/project.yml --project apple/LetsMakeMoney.xcodeproj
      - name: List formal App and Widget schemes
        run: xcodebuild -project apple/LetsMakeMoney.xcodeproj -list | tee build/apple-sdk-ci/formal-schemes.log
      - name: Compile the real App and embedded Widget Extension
        run: |
          set -o pipefail
          xcodebuild \
            -project apple/LetsMakeMoney.xcodeproj \
            -scheme LetsMakeMoneyApp \
            -destination 'generic/platform=iOS Simulator' \
            -derivedDataPath build/apple-sdk-ci/FormalDerivedData \
            CODE_SIGNING_ALLOWED=NO \
            build | tee build/apple-sdk-ci/formal-app-widget.log
          widget_path="$(find build/apple-sdk-ci/FormalDerivedData -type d -name 'LetsMakeMoneyWidget.appex' -print -quit)"
          test -n "$widget_path"
          echo "$widget_path" | tee build/apple-sdk-ci/formal-widget-product.log
      - name: Upload experimental diagnostics
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: apple-sdk-experimental-diagnostics
          path: |
            build/apple-sdk-ci/xcodebuild-list.log
            build/apple-sdk-ci/xcodebuild.log
            build/apple-sdk-ci/g3-schemes.log
            build/apple-sdk-ci/g3-app.log
            build/apple-sdk-ci/g3-widget-activity.log
            build/apple-sdk-ci/g3-watch.log
            build/apple-sdk-ci/formal-schemes.log
            build/apple-sdk-ci/formal-app-widget.log
            build/apple-sdk-ci/formal-widget-product.log
            build/apple-sdk-ci/LetsMakeMoneyAppleSDK-playgrounds.zip
          if-no-files-found: warn
