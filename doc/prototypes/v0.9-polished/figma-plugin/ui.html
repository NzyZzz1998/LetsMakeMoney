    const button = document.getElementById("build");
    const status = document.getElementById("status");
    button.onclick = () => {
      button.disabled = true;
      status.textContent = "正在验证页面所有权、素材哈希并重建 LMM 设计...";
      parent.postMessage({ pluginMessage: { type: "build", assets } }, "*");

      status.textContent = message.message || message.text || "";
